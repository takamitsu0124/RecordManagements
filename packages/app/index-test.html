<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>SAOIFツール ファビコン切り出し</title>
    <style>
      body {
        font-family: sans-serif;
        background: #1a1a1a;
        color: #fff;
        padding: 20px;
        text-align: center;
      }
      .drop-zone {
        border: 2px dashed #00bfff;
        padding: 30px;
        margin: 20px auto;
        max-width: 500px;
        cursor: pointer;
        background: #2a2a2a;
        border-radius: 8px;
      }
      .result-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        margin-top: 30px;
      }
      .card {
        background: #333;
        padding: 15px;
        border-radius: 8px;
        width: 150px;
        text-align: center;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }
      .preview-box {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 130px;
        background: #222;
        border-radius: 4px;
        margin-bottom: 10px;
        overflow: hidden;
      }
      .btn {
        display: inline-block;
        padding: 8px 12px;
        background: #00bfff;
        color: #fff;
        text-decoration: none;
        border-radius: 4px;
        font-weight: bold;
        font-size: 14px;
      }
      .btn:hover {
        background: #0099cc;
      }
    </style>
  </head>
  <body>
    <h2>SAOIF RecordManagements<br />ファビコン一括リサイズツール</h2>
    <p>さきほどの「R」の画像を、下のエリアにドラッグ＆ドロップしてください。</p>

    <div class="drop-zone" id="dropZone">
      ここに画像をドラッグ＆ドロップ、またはクリックして選択
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display: none" />

    <div
      class="result-container"
      id="resultContainer"
      style="display: none"
    ></div>

    <script>
      const dropZone = document.getElementById('dropZone')
      const fileInput = document.getElementById('fileInput')
      const resultContainer = document.getElementById('resultContainer')
      const sizes = [16, 32, 96, 128, 256]

      dropZone.addEventListener('click', () => fileInput.click())
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault()
        dropZone.style.background = '#3a3a3a'
      })
      dropZone.addEventListener(
        'dragleave',
        () => (dropZone.style.background = '#2a2a2a')
      )
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault()
        handleFile(e.dataTransfer.files[0])
      })
      fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]))

      function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) return
        const reader = new FileReader()
        reader.onload = (e) => {
          const img = new Image()
          img.onload = () => {
            resultContainer.innerHTML = ''
            resultContainer.style.display = 'flex'

            sizes.forEach((size) => {
              const canvas = document.createElement('canvas')
              canvas.width = size
              canvas.height = size
              const ctx = canvas.getContext('2d')

              // きれいに縮小するための処理
              ctx.imageSmoothingEnabled = true
              ctx.imageSmoothingQuality = 'high'
              ctx.drawImage(img, 0, 0, size, size)

              const dataUrl = canvas.toDataURL('image/png')

              // カードUIの作成
              const card = document.createElement('div')
              card.className = 'card'

              const previewBox = document.createElement('div')
              previewBox.className = 'preview-box'
              const previewImg = new Image()
              previewImg.src = dataUrl
              previewBox.appendChild(previewImg)

              const label = document.createElement('p')
              label.textContent = `${size} x ${size}`
              label.style.margin = '5px 0 10px 0'

              const btn = document.createElement('a')
              btn.className = 'btn'
              btn.href = dataUrl
              btn.download = `favicon-${size}x${size}.png`
              btn.textContent = 'ダウンロード'

              card.appendChild(previewBox)
              card.appendChild(label)
              card.appendChild(btn)
              resultContainer.appendChild(card)
            })
          }
          img.src = e.target.result
        }
        reader.readAsDataURL(file)
      }
    </script>
  </body>
</html>
